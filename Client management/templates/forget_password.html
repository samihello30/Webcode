<!DOCTYPE html>

<html>
<head>
				<meta http-equiv="CONTENT-TYPE" content="text/html; charset=UTF-8">
				<meta name="author" content="Samuel Akintola">
				<meta name="description" content="This page is the password recovery page for the client manager">
				<meta name="viewport" content="width=device-width, initial-scale=1.0">
				<link rel="icon" href="" type="image/x-icon">
				<link rel="stylesheet" href="{{ url_for('static', filename='forget_password.css') }}" type="text/css">
				<title>Password Recovery</title>
</head>
<body>
				{% with messages = get_flashed_messages(with_categories=True) %}
				    {% if messages %}
								    <ul class="flashes">
								        {% for category, message in messages %}
								        				<li class="{{ category }}">{{ message }}</li>
								        {% endfor %}
								    </ul>
				    {% endif %}
    {% endwith %}
				<header>
				<h1>
								Recovery Password
				</h1>
				</header>
				
				<hr>
				
				<main>
								<article>
												<form method="post" action="{{ url_for('recovery') }}">
																<p>
																				<label for="email">Email</label><br>
																				<input type="email" id="email" name="email" autocomplete="on" required placeholder="Enter the email used">
																</p>
																
																	<p>
																			<label for="phone_number">Phone Number</label><br>
																				<input type="tel" id="phone_number" name="phone_number" autocomplete="on" required placeholder="Enter the phone number used"> 
																</p>
																
																<p>
																				<label for="password">New Password</label><br>
																				<input type="password" id="password" name="password" autocomplete="on" required placeholder="Enter new password">
																</p>
																
																	<p>
																				<label for="confirm_password">Confirm Password</label><br>
																				<input type="password" id="confirm_password" name="confirm_password" autocomplete="on" placeholder="Re-enter  password">
																</p>
													
																<p>
																				<button type="submit">Login</button>
																</p>
												</form>
								</article>
				</main>
				
				<hr>
				
				<footer>
								<p><a href="{{ url_for('homepage') }}">Back home</a></p>
								<p><a href="{{ url_for('feedback', mode='recovery') }}" target="_blank">Send feeback</a></p>
								<p>&copy; <a href="{{ url_for('aboutme') }}"  target="_blank">Samuel Akintola</a> 2025. All right reserved.</p>
				</footer>
</body>
</html>
